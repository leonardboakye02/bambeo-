<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection - Bambeo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0a;--text:#fff;--text-muted:#888;--text-dim:#666;--border:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.03);--pink:#ff66b2;--blue:#66d9ff;--purple:#b366ff;--green:#66ff99;--orange:#ff9966;--red:#ff6680}
    body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px}
    .nav-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
    .logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
    .nav-links{display:flex;gap:32px;align-items:center}
    .nav-links a{font-size:14px;color:var(--text-muted);transition:color 0.2s}
    .nav-links a:hover{color:var(--text)}
    .btn{display:inline-block;padding:12px 28px;border-radius:50px;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s;border:none;text-align:center;font-family:inherit}
    .btn-primary{background:var(--text);color:var(--bg)}
    .btn-primary:hover{background:#e0e0e0}
    .btn-outline{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.2)}
    .btn-outline:hover{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05)}
    .cart-btn{position:relative;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;transition:color 0.2s}
    .cart-btn:hover{color:var(--text)}
    .cart-count{position:absolute;top:-4px;right:-4px;background:var(--pink);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
    .cart-count.show{display:flex}
    .collection-hero{padding:140px 24px 60px;text-align:center;background:radial-gradient(ellipse at 30% 20%,rgba(100,50,150,0.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(50,100,150,0.06) 0%,transparent 50%)}
    .section-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
    .collection-title{font-family:'Syne',sans-serif;font-size:clamp(40px,7vw,72px);font-weight:800;line-height:1;margin-bottom:16px;text-transform:capitalize}
    .collection-subtitle{font-size:16px;color:var(--text-dim);margin-bottom:32px}
    .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);font-size:14px;margin-bottom:24px;transition:color 0.2s}
    .back-link:hover{color:var(--text)}
    section{padding:60px 24px 100px}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .product-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.3s}
    .product-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.12)}
    .product-image{aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
    .product-image span{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;text-align:center}
    .product-tag{position:absolute;top:12px;left:12px;padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase}
    .product-tag.best{background:#fbbf24;color:#000}
    .product-tag.new{background:#4ade80;color:#000}
    .product-info{padding:16px}
    .product-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;margin-bottom:4px}
    .product-price{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text-muted)}
    .add-to-cart-btn{position:absolute;bottom:12px;right:12px;padding:6px 14px;background:rgba(255,255,255,0.9);color:#000;border:none;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;opacity:0;transition:opacity 0.2s;font-family:inherit}
    .product-card:hover .add-to-cart-btn{opacity:1}
    .empty-state{text-align:center;padding:80px 24px;color:var(--text-dim)}
    .empty-state h3{font-family:'Syne',sans-serif;font-size:24px;color:var(--text);margin-bottom:8px}
    .empty-state p{font-size:14px}
    .loader{text-align:center;padding:80px 24px;color:var(--text-dim);font-size:14px}

    /* CART */
    .cart-drawer{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;background:#111;border-left:1px solid var(--border);z-index:200;transition:right 0.3s;display:flex;flex-direction:column}
    .cart-drawer.open{right:0}
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;display:none}
    .cart-overlay.open{display:block}
    .cart-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
    .cart-header h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
    .cart-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer}
    .cart-items{flex:1;overflow-y:auto;padding:16px 24px}
    .cart-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);align-items:center}
    .cart-item-color{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
    .cart-item-info{flex:1}
    .cart-item-name{font-size:14px;font-weight:600;margin-bottom:2px}
    .cart-item-price{font-size:13px;color:var(--text-muted)}
    .cart-item-qty{display:flex;align-items:center;gap:8px}
    .cart-item-qty button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:#fff;cursor:pointer;font-size:14px}
    .cart-item-qty span{font-size:14px;min-width:20px;text-align:center}
    .cart-item-remove{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px}
    .cart-item-remove:hover{color:var(--red)}
    .cart-footer{padding:20px 24px;border-top:1px solid var(--border)}
    .cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .cart-total span{font-size:14px;color:var(--text-muted)}
    .cart-total strong{font-family:'Syne',sans-serif;font-size:20px}
    .cart-empty{text-align:center;padding:48px 0;color:var(--text-dim);font-size:14px}

    @media(max-width:768px){.nav-links{display:none}.cart-drawer{width:100%;max-width:100%;right:-100%}}

    /* Product card description & search */
    .product-desc{font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .search-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
    .search-input{flex:1;min-width:220px;padding:12px 16px;background:var(--glass);border:1px solid var(--border);border-radius:50px;color:#fff;font-family:inherit;font-size:14px}
    .search-input:focus{outline:none;border-color:rgba(255,255,255,0.25)}
    .img-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:4px;justify-content:center;pointer-events:none}
    .img-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.45)}
    .img-dots span.active{background:#fff}

    /* Admin inline edit */
    .admin-edit-btn{position:absolute;top:12px;right:12px;padding:6px 12px;background:#fff;color:#000;border:none;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;z-index:2}
    .admin-edit-btn:hover{background:#eee}
    .admin-delete-btn{position:absolute;top:12px;right:72px;padding:6px 10px;background:rgba(255,102,128,0.9);color:#fff;border:none;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;z-index:2}
    .admin-add-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#fff;color:#000;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
    .admin-badge{display:inline-block;padding:4px 10px;background:rgba(102,217,255,0.15);color:var(--blue);border:1px solid rgba(102,217,255,0.3);border-radius:50px;font-size:11px;font-weight:600;margin-bottom:12px}
    .admin-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
    .admin-modal-overlay.open{display:flex}
    .admin-modal{background:#141414;border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;color:#fff}
    .admin-modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
    .admin-modal-header h3{font-family:'Syne',sans-serif;font-size:18px}
    .admin-modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
    .admin-modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
    .admin-field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    .admin-field input,.admin-field select,.admin-field textarea{width:100%;padding:10px 12px;background:#1c1c1c;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;font-family:inherit}
    .admin-field input[type=color]{height:40px;padding:4px}
    .admin-field input[type=file]{padding:6px;font-size:12px}
    .admin-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .admin-preview{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);background:#1c1c1c;display:none}
    .btn-admin{padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none}
    .btn-admin-primary{background:#fff;color:#000}
    .btn-admin-ghost{background:transparent;color:#fff;border:1px solid var(--border)}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BAMBEO</a>
      <div class="nav-links">
        <a href="/#products">Shop</a>
        <a href="/#designer">Design</a>
        <a href="/#about">About</a>
        <a href="/#contact">Contact</a>
        <button class="cart-btn" onclick="toggleCart()">&#128722;<span class="cart-count" id="cartCount">0</span></button>
      </div>
    </div>
  </nav>

  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="toggleCart()">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Subtotal</span><strong id="cartTotal">$0</strong></div>
      <button class="btn btn-primary" style="width:100%" onclick="checkout()">Checkout</button>
    </div>
  </div>

  <section class="collection-hero">
    <div class="container">
      <a href="/#products" class="back-link">← Back to all collections</a>
      <div class="section-label">Collection</div>
      <h1 class="collection-title" id="collectionTitle">Loading...</h1>
      <p class="collection-subtitle" id="collectionSubtitle">Curated pieces from this collection</p>
      <div id="adminToolbar" style="display:none;margin-top:16px">
        <span class="admin-badge">Admin mode</span>
        <div><button class="admin-add-btn" onclick="openAdminEdit(null)">+ Add Product to this Collection</button></div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="search-row">
        <input type="text" class="search-input" id="productSearch" placeholder="Search products..." oninput="renderCollection()">
      </div>
      <div id="productsContainer">
        <div class="loader">Loading collection...</div>
      </div>
    </div>
  </section>

  <!-- Admin Edit Modal -->
  <div class="admin-modal-overlay" id="adminEditModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="adminEditTitle">Edit Product</h3>
        <button class="cart-close" onclick="closeAdminEdit()">&times;</button>
      </div>
      <div class="admin-modal-body">
        <input type="hidden" id="aeId">
        <div class="admin-field"><label>Product Name</label><input type="text" id="aeName" placeholder="e.g., Good Vibes Sign"></div>
        <div class="admin-field"><label>Display Text</label><input type="text" id="aeDisplayText" placeholder="e.g., Good Vibes"></div>
        <div class="admin-row">
          <div class="admin-field"><label>Price ($)</label><input type="number" id="aePrice" placeholder="149"></div>
          <div class="admin-field"><label>Color</label><input type="color" id="aeColor" value="#ff66b2"></div>
        </div>
        <div class="admin-row">
          <div class="admin-field"><label>Category</label><input type="text" id="aeCategory" placeholder="art, coffee, love..."></div>
          <div class="admin-field"><label>Tag</label><select id="aeTag"><option value="">None</option><option value="best">Bestseller</option><option value="new">New</option></select></div>
        </div>
        <div class="admin-field">
          <label>Description</label>
          <textarea id="aeDescription" rows="3" placeholder="Short description shown on the product card..."></textarea>
        </div>
        <div class="admin-field">
          <label>Images (first is primary · drop or click below)</label>
          <div id="aeDropzone" style="border:2px dashed rgba(255,255,255,0.2);border-radius:10px;padding:14px;text-align:center;color:var(--text-muted);font-size:12px;cursor:pointer;margin-bottom:8px" ondragover="aeDragOver(event)" ondragleave="aeDragLeave(event)" ondrop="aeDrop(event)" onclick="document.getElementById('aeImageFile').click()">
            Drop images here or click to upload · max 2MB each
          </div>
          <input type="file" id="aeImageFile" accept="image/*" multiple onchange="aeHandleFiles(event)" style="display:none">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input type="text" id="aeImageUrlInput" placeholder="...or paste URL" style="flex:1">
            <button type="button" class="btn-admin btn-admin-ghost" onclick="aeAddUrl()">Add</button>
          </div>
          <div id="aeImagesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px"></div>
          <input type="hidden" id="aeImages">
          <input type="hidden" id="aeImage">
        </div>
        <div class="admin-row">
          <div class="admin-field"><label>Sort Order</label><input type="number" id="aeSort" value="0"></div>
          <div class="admin-field"><label>Status</label><select id="aeActive"><option value="true">Active</option><option value="false">Inactive</option></select></div>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-admin btn-admin-ghost" onclick="closeAdminEdit()">Cancel</button>
        <button class="btn-admin btn-admin-primary" onclick="saveAdminEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://mlqcjkyupgayhbbdlttr.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scWNqa3l1cGdheWhiYmRsdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjUzMDIsImV4cCI6MjA5MTI0MTMwMn0.LI3Lk7b1RgntGIEI0doBpZqcRuayN6Gti4ygFFfJ1vY';

    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
    }
    function escColor(c) {
      if (!c) return '#ff66b2';
      var s = String(c);
      if (/^#[0-9a-fA-F]{3,8}$/.test(s)) return s;
      return '#ff66b2';
    }

    function getCategoryParam() {
      var params = new URLSearchParams(window.location.search);
      return params.get('cat') || params.get('category') || '';
    }

    var allProducts = [];
    var cart = JSON.parse(localStorage.getItem('bambeo_cart') || '[]');
    // Stored password is only a *candidate* until the server confirms it.
    // isAdmin stays false until /api/admin accepts the credential on a harmless call.
    var ADMIN_PW = localStorage.getItem('bambeo_admin_pw') || sessionStorage.getItem('bambeo_admin_pw') || '';
    var isAdmin = false;
    var VALID_IMG = /^(https?:|data:image\/)/i;
    var aeImagesDraft = [];

    function normalizeImages(p) {
      if (!p) return [];
      var arr = [];
      if (Array.isArray(p.image_urls)) arr = p.image_urls.slice();
      else if (typeof p.image_urls === 'string') {
        try { var parsed = JSON.parse(p.image_urls); if (Array.isArray(parsed)) arr = parsed; } catch (e) {}
      }
      if (!arr.length && p.image_url) arr = [p.image_url];
      return arr.filter(function(u) { return u && VALID_IMG.test(u); });
    }

    function fetchFromSupabase(table) {
      return fetch(SUPABASE_URL + '/rest/v1/' + table + '?select=*', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      }).then(function(r) { return r.json(); }).catch(function() { return []; });
    }

    function renderCollection() {
      var cat = getCategoryParam();
      var titleEl = document.getElementById('collectionTitle');
      var subEl = document.getElementById('collectionSubtitle');
      var container = document.getElementById('productsContainer');

      var prettyName = cat ? cat.replace(/[-_]/g, ' ') : 'Collection';
      titleEl.textContent = prettyName + ' Collection';
      document.title = prettyName + ' Collection - Bambeo';

      var byCat = !cat ? allProducts : allProducts.filter(function(p) {
        return (p.category || '').toLowerCase() === cat.toLowerCase();
      });

      var q = (document.getElementById('productSearch') ? document.getElementById('productSearch').value : '').toLowerCase().trim();
      var filtered = !q ? byCat : byCat.filter(function(p) {
        var hay = ((p.name||'') + ' ' + (p.display_text||'') + ' ' + (p.description||'')).toLowerCase();
        return hay.indexOf(q) !== -1;
      });

      if (!byCat.length) {
        subEl.textContent = 'No pieces in this collection yet';
        container.innerHTML = '<div class="empty-state"><h3>Coming Soon</h3><p>We\'re working on adding more pieces to this collection.</p></div>';
        return;
      }
      if (!filtered.length) {
        subEl.textContent = 'No matches for "' + esc(q) + '"';
        container.innerHTML = '<div class="empty-state"><h3>No matches</h3><p>Try a different search.</p></div>';
        return;
      }

      subEl.textContent = filtered.length + (filtered.length === 1 ? ' piece' : ' pieces') + ' in this collection';

      container.innerHTML = '<div class="products-grid">' + filtered.map(function(p) {
        var safeId = esc(p.id);
        var safeTag = (p.tag === 'best' || p.tag === 'new') ? p.tag : '';
        var imgs = normalizeImages(p);
        var primary = imgs[0] || '';
        var imageBg = primary ? ' style="background-image:url(\'' + esc(primary) + '\');background-size:cover;background-position:center;padding:0"' : '';
        var labelHtml = primary ? '' : '<span style="color:' + escColor(p.color) + '">' + esc(p.display_text || p.name) + '</span>';
        var dots = imgs.length > 1
          ? '<div class="img-dots">' + imgs.map(function(_, i) { return '<span class="' + (i === 0 ? 'active' : '') + '"></span>'; }).join('') + '</div>'
          : '';
        var adminCtrls = isAdmin
          ? '<button class="admin-delete-btn" onclick="adminDelete(\'' + safeId + '\')">Delete</button><button class="admin-edit-btn" onclick="openAdminEdit(\'' + safeId + '\')">Edit</button>'
          : '<button class="add-to-cart-btn" onclick="addToCart(\'' + safeId + '\')">Add to Cart</button>';
        var tagHtml = safeTag ? '<span class="product-tag ' + safeTag + '">' + (safeTag === 'best' ? 'Best' : 'New') + '</span>' : '';
        var descHtml = p.description ? '<div class="product-desc">' + esc(p.description) + '</div>' : '';
        return '<div class="product-card">'
          + '<div class="product-image"' + imageBg + '>' + tagHtml + labelHtml + dots + adminCtrls + '</div>'
          + '<div class="product-info">'
          + '<div class="product-name">' + esc(p.name) + '</div>'
          + '<div class="product-price"><strong>$' + esc(String(p.price)) + '</strong><span>From</span></div>'
          + descHtml
          + '</div></div>';
      }).join('') + '</div>';
    }

    function addToCart(productId) {
      var product = null;
      for (var i = 0; i < allProducts.length; i++) {
        if (allProducts[i].id === productId) { product = allProducts[i]; break; }
      }
      if (!product) return;
      for (var j = 0; j < cart.length; j++) {
        if (cart[j].id === productId) {
          cart[j].quantity++;
          saveCart();
          toggleCart(true);
          return;
        }
      }
      cart.push({
        id: product.id,
        name: product.name,
        display_text: product.display_text,
        price: parseFloat(product.price),
        color: product.color,
        quantity: 1
      });
      saveCart();
      toggleCart(true);
    }

    function saveCart() {
      localStorage.setItem('bambeo_cart', JSON.stringify(cart));
      updateCartUI();
    }

    function updateCartUI() {
      var count = cart.reduce(function(sum, item) { return sum + item.quantity; }, 0);
      var countEl = document.getElementById('cartCount');
      countEl.textContent = count;
      countEl.className = 'cart-count' + (count > 0 ? ' show' : '');

      var itemsEl = document.getElementById('cartItems');
      var totalEl = document.getElementById('cartTotal');
      if (!cart.length) {
        itemsEl.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
        totalEl.textContent = '$0';
        return;
      }
      var total = 0;
      itemsEl.innerHTML = cart.map(function(item, idx) {
        total += item.price * item.quantity;
        return '<div class="cart-item"><div class="cart-item-color" style="background:' + escColor(item.color) + ';color:#fff">' + esc((item.display_text || item.name || '?').charAt(0)) + '</div><div class="cart-item-info"><div class="cart-item-name">' + esc(item.name) + '</div><div class="cart-item-price">$' + esc(String(item.price)) + ' each</div></div><div class="cart-item-qty"><button onclick="changeQty(' + idx + ',-1)">−</button><span>' + item.quantity + '</span><button onclick="changeQty(' + idx + ',1)">+</button></div><button class="cart-item-remove" onclick="removeFromCart(' + idx + ')">×</button></div>';
      }).join('');
      totalEl.textContent = '$' + total.toFixed(2);
    }

    function changeQty(idx, delta) {
      cart[idx].quantity += delta;
      if (cart[idx].quantity <= 0) cart.splice(idx, 1);
      saveCart();
    }
    function removeFromCart(idx) {
      cart.splice(idx, 1);
      saveCart();
    }

    function toggleCart(forceOpen) {
      var drawer = document.getElementById('cartDrawer');
      var overlay = document.getElementById('cartOverlay');
      var open = forceOpen === true || !drawer.classList.contains('open');
      drawer.className = 'cart-drawer' + (open ? ' open' : '');
      overlay.className = 'cart-overlay' + (open ? ' open' : '');
    }

    function checkout() {
      if (!cart.length) return;
      var items = cart.map(function(item) {
        return { id: item.id, name: item.name, display_text: item.display_text, price: item.price, color: item.color, quantity: item.quantity };
      });
      fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: items })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.url) window.location.href = data.url;
        else alert('Error creating checkout. Please try again.');
      })
      .catch(function() { alert('Error connecting to payment.'); });
    }

    // ========== ADMIN FUNCTIONS ==========
    function adminApi(body) {
      return fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ADMIN_PW },
        body: JSON.stringify(body)
      }).then(function(r) { return r.json(); });
    }

    function loadProducts() {
      if (isAdmin) {
        // Admin sees all (active + inactive) via admin API
        adminApi({ table: 'products', action: 'select', data: { select: '*' } }).then(function(res) {
          var data = res && res.data ? res.data : (Array.isArray(res) ? res : []);
          allProducts = Array.isArray(data) ? data : [];
          renderCollection();
        }).catch(function() {
          // Fallback: anon read
          fetchFromSupabase('products').then(function(p) {
            allProducts = Array.isArray(p) ? p.filter(function(x){return x.is_active!==false;}) : [];
            renderCollection();
          });
        });
      } else {
        fetchFromSupabase('products').then(function(products) {
          allProducts = Array.isArray(products) ? products.filter(function(p){return p.is_active!==false;}) : [];
          renderCollection();
        });
      }
    }

    function openAdminEdit(productId) {
      var p = null;
      if (productId) {
        for (var i = 0; i < allProducts.length; i++) {
          if (allProducts[i].id === productId) { p = allProducts[i]; break; }
        }
      }
      document.getElementById('adminEditTitle').textContent = p ? 'Edit Product' : 'Add Product';
      document.getElementById('aeId').value = p ? p.id : '';
      document.getElementById('aeName').value = p ? (p.name || '') : '';
      document.getElementById('aeDisplayText').value = p ? (p.display_text || '') : '';
      document.getElementById('aePrice').value = p ? (p.price || '') : '';
      document.getElementById('aeColor').value = p && p.color ? p.color : '#ff66b2';
      document.getElementById('aeCategory').value = p ? (p.category || getCategoryParam()) : getCategoryParam();
      document.getElementById('aeTag').value = p ? (p.tag || '') : '';
      document.getElementById('aeDescription').value = p ? (p.description || '') : '';
      document.getElementById('aeSort').value = p ? (p.sort_order || 0) : 0;
      document.getElementById('aeActive').value = (p && p.is_active === false) ? 'false' : 'true';
      document.getElementById('aeImageFile').value = '';
      document.getElementById('aeImageUrlInput').value = '';
      aeImagesDraft = normalizeImages(p);
      aeRenderGrid();
      document.getElementById('adminEditModal').classList.add('open');
    }

    function closeAdminEdit() {
      document.getElementById('adminEditModal').classList.remove('open');
    }

    function aeRenderGrid() {
      var grid = document.getElementById('aeImagesGrid');
      if (!aeImagesDraft.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:var(--text-muted);font-size:12px;padding:4px 0">No images yet</div>';
      } else {
        grid.innerHTML = aeImagesDraft.map(function(url, i) {
          return '<div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:#1c1c1c">'
            + '<img src="' + esc(url) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
            + (i === 0 ? '<span style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.75);color:#fff;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600">PRIMARY</span>' : '')
            + '<button type="button" onclick="aeRemove(' + i + ')" title="Remove" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,0.75);color:#fff;cursor:pointer;font-size:12px;line-height:1">×</button>'
            + (i > 0 ? '<button type="button" onclick="aePromote(' + i + ')" title="Make primary" style="position:absolute;top:4px;left:4px;padding:2px 6px;border-radius:10px;border:none;background:rgba(255,255,255,0.92);color:#000;cursor:pointer;font-size:10px;font-weight:600">Set primary</button>' : '')
            + '</div>';
        }).join('');
      }
      document.getElementById('aeImages').value = JSON.stringify(aeImagesDraft);
      document.getElementById('aeImage').value = aeImagesDraft[0] || '';
    }

    function aeAddUrl() {
      var input = document.getElementById('aeImageUrlInput');
      var url = (input.value || '').trim();
      if (!url) return;
      if (!VALID_IMG.test(url)) { alert('Only http(s) or data:image URLs allowed'); return; }
      aeImagesDraft.push(url);
      input.value = '';
      aeRenderGrid();
    }

    function aeRemove(i) { aeImagesDraft.splice(i, 1); aeRenderGrid(); }
    function aePromote(i) {
      if (i <= 0 || i >= aeImagesDraft.length) return;
      var item = aeImagesDraft.splice(i, 1)[0];
      aeImagesDraft.unshift(item);
      aeRenderGrid();
    }

    function aeHandleFiles(e) {
      aeIngest(Array.from(e.target.files || []));
      e.target.value = '';
    }

    function aeIngest(files) {
      var remaining = files.length;
      if (!remaining) return;
      files.forEach(function(f) {
        if (!f.type || f.type.indexOf('image/') !== 0) { remaining--; if (!remaining) aeRenderGrid(); return; }
        if (f.size > 2 * 1024 * 1024) { alert('"' + f.name + '" exceeds 2MB, skipped'); remaining--; if (!remaining) aeRenderGrid(); return; }
        var r = new FileReader();
        r.onload = function(ev) {
          aeImagesDraft.push(ev.target.result);
          remaining--;
          if (!remaining) aeRenderGrid();
        };
        r.onerror = function() { remaining--; if (!remaining) aeRenderGrid(); };
        r.readAsDataURL(f);
      });
    }

    function aeDragOver(e) { e.preventDefault(); e.currentTarget.style.borderColor = '#66d9ff'; }
    function aeDragLeave(e) { e.currentTarget.style.borderColor = 'rgba(255,255,255,0.2)'; }
    function aeDrop(e) {
      e.preventDefault();
      aeDragLeave(e);
      var files = Array.from(e.dataTransfer ? e.dataTransfer.files : []);
      if (files.length) aeIngest(files);
    }

    function saveAdminEdit() {
      var id = document.getElementById('aeId').value;
      var name = document.getElementById('aeName').value.trim();
      if (!name) { alert('Name is required'); return; }
      var priceVal = parseFloat(document.getElementById('aePrice').value);
      var images = aeImagesDraft.slice();
      var row = {
        name: name,
        display_text: document.getElementById('aeDisplayText').value || null,
        price: isNaN(priceVal) ? 0 : priceVal,
        color: document.getElementById('aeColor').value,
        category: document.getElementById('aeCategory').value || null,
        tag: document.getElementById('aeTag').value || null,
        description: document.getElementById('aeDescription').value || null,
        image_urls: images,
        image_url: images[0] || null,
        sort_order: parseInt(document.getElementById('aeSort').value, 10) || 0,
        is_active: document.getElementById('aeActive').value === 'true'
      };
      var req = id
        ? adminApi({ table: 'products', action: 'update', data: { rows: row }, filters: { id: id } })
        : adminApi({ table: 'products', action: 'insert', data: { rows: row } });
      req.then(function(res) {
        if (res && res.error) { alert('Save failed: ' + (res.error.message || res.error)); return; }
        closeAdminEdit();
        loadProducts();
      }).catch(function() { alert('Save failed'); });
    }

    function adminDelete(id) {
      if (!confirm('Delete this product?')) return;
      adminApi({ table: 'products', action: 'delete', filters: { id: id } }).then(function(res) {
        if (res && res.error) { alert('Delete failed'); return; }
        loadProducts();
      }).catch(function() { alert('Delete failed'); });
    }

    // Server-verify the stored admin password before exposing any admin UI.
    // If it's missing, expired, or invalid the page renders as pure customer view.
    function verifyAdmin() {
      if (!ADMIN_PW) return Promise.resolve(false);
      return fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ADMIN_PW },
        body: JSON.stringify({ table: 'site_settings', action: 'select', data: { select: 'key' } })
      }).then(function(r) {
        if (r.status === 200) return true;
        // Invalid or rate-limited — strip any stale credential to stop further leaks.
        if (r.status === 401) {
          localStorage.removeItem('bambeo_admin_pw');
          sessionStorage.removeItem('bambeo_admin_pw');
          ADMIN_PW = '';
        }
        return false;
      }).catch(function() { return false; });
    }

    // Init
    verifyAdmin().then(function(ok) {
      isAdmin = ok;
      var toolbar = document.getElementById('adminToolbar');
      if (toolbar) toolbar.style.display = ok ? 'block' : 'none';
      loadProducts();
    });
    updateCartUI();
  </script>
</body>
</html>
